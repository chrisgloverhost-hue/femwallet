name: 05-security-checks

on:
  pull_request:
    branches:
      - onekey
      - x
      - hotfix/*
      - release/*
  push:
    branches:
      - onekey
      - x

# Cancel a currently running workflow from the same PR/branch/tag
# when a new workflow is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  YARN_ENABLE_GLOBAL_CACHE: true

jobs:
  supply-chain:
    name: Supply Chain - Minimum Release Age
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@onekeyhq'

      - name: Write security checks AI prompt
        run: |
          mkdir -p ci-ai
          node .github/scripts/ciFailureIssue.js prompt security-checks > ci-ai/security-checks-ai-prompt.md || \
            echo "AI prompt generation failed; inspect the failed step log and minimum-release-age.log." > ci-ai/security-checks-ai-prompt.md

      - name: Install Dependency
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max_old_space_size=4096'
        run: |
          yarn install --immutable

      - name: Check minimum release age
        run: |
          mkdir -p ci-ai
          set +e
          npx tsx development/scripts/minimum-release-age/run.ts diff origin/${{ github.base_ref }} 2>&1 | tee ci-ai/minimum-release-age.log
          status=${PIPESTATUS[0]}
          set -e
          exit "$status"

      - name: Upload security checks AI diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-ai-security-checks-diagnostics
          path: |
            ci-ai/security-checks-ai-prompt.md
            ci-ai/minimum-release-age.log
          if-no-files-found: warn
          retention-days: 14

      - name: Explain security check failure diagnostics
        if: failure()
        run: |
          {
            echo "### CI diagnostics"
            echo "- Download artifact: \`ci-ai-security-checks-diagnostics\`"
            echo "- Open: \`minimum-release-age.log\` and \`security-checks-ai-prompt.md\`"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=CI diagnostics::Download ci-ai-security-checks-diagnostics and inspect minimum-release-age.log"
