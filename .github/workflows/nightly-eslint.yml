name: 06-nightly-eslint

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  YARN_ENABLE_GLOBAL_CACHE: true

jobs:
  eslint-check:
    name: ESLint Check
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
          registry-url: 'https://npm.pkg.github.com'
          check-latest: true
          scope: '@onekeyhq'

      - name: Write ESLint AI prompt
        run: |
          mkdir -p ci-ai
          node .github/scripts/ciFailureIssue.js prompt eslint > ci-ai/eslint-ai-prompt.md || \
            echo "AI prompt generation failed; inspect the failed step log and eslint-output.log." > ci-ai/eslint-ai-prompt.md

      - name: Install Dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max_old_space_size=8192'
        run: yarn install --immutable

      - name: Run ESLint
        env:
          NODE_OPTIONS: '--max_old_space_size=8192'
        run: |
          mkdir -p ci-ai
          set +e
          npx eslint . --ext .ts,.tsx --max-warnings 0 2>&1 | tee ci-ai/eslint-output.log
          status=${PIPESTATUS[0]}
          set -e
          exit "$status"

      - name: Upload ESLint AI diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-ai-eslint-diagnostics
          path: |
            ci-ai/eslint-ai-prompt.md
            ci-ai/eslint-output.log
          if-no-files-found: warn
          retention-days: 14

      - name: Explain ESLint failure diagnostics
        if: failure()
        run: |
          {
            echo "### CI diagnostics"
            echo "- Download artifact: \`ci-ai-eslint-diagnostics\`"
            echo "- Open: \`eslint-output.log\` and \`eslint-ai-prompt.md\`"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=CI diagnostics::Download ci-ai-eslint-diagnostics and inspect eslint-output.log"

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-24.04
    needs: eslint-check
    if: failure() && github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const {
              ciFailureConfigs,
              upsertCiFailureIssue,
            } = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/ciFailureIssue`);

            await upsertCiFailureIssue({
              github,
              context,
              config: ciFailureConfigs.eslint,
            });
